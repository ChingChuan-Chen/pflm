name: Python CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install ruff
      run: |
        python -m pip install --upgrade pip
        python -m pip install ruff>=0.11.7

    - name: Ruff check
      run: |
        ruff check pflm

  ubuntu-tests:
    needs: ruff
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0"
        python -m pip install .[tests]
        python -m pip uninstall -y pflm
        python -m pip install --verbose --no-build-isolation --editable . --config-settings editable-verbose=true --config-settings build-dir=build/gha-${{ runner.os }}-${{ matrix.python-version }}

    - name: Test with pytest
      run: |
        python -m pytest . -v

  ubuntu-tests-extended:
    needs: ruff
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0"
        python -m pip install .[tests]
        python -m pip uninstall -y pflm
        python -m pip install --verbose --no-build-isolation --editable . --config-settings editable-verbose=true --config-settings build-dir=build/gha-${{ runner.os }}-${{ matrix.python-version }}

    - name: Test with pytest
      run: |
        python -m pytest . -v

  windows-conda-tests:
    needs: ruff
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Miniconda with Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: pflm-test
        auto-activate-base: false
        channels: conda-forge
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      shell: pwsh
      run: |
        conda run -n pflm-test python -m pip install --upgrade pip
        conda run -n pflm-test python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0"
        conda run -n pflm-test python -m pip install .[tests]
        conda run -n pflm-test python -m pip uninstall -y pflm
        conda run -n pflm-test python -m pip install --verbose --no-build-isolation --editable . --config-settings editable-verbose=true --config-settings build-dir=build/gha-conda-${{ runner.os }}-${{ matrix.python-version }}

    - name: Test with pytest
      shell: pwsh
      run: |
        conda run -n pflm-test python -m pytest . -v

  windows-conda-tests-extended:
    needs: ruff
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Miniconda with Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: pflm-test
        auto-activate-base: false
        channels: conda-forge
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      shell: pwsh
      run: |
        conda run -n pflm-test python -m pip install --upgrade pip
        conda run -n pflm-test python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0"
        conda run -n pflm-test python -m pip install .[tests]
        conda run -n pflm-test python -m pip uninstall -y pflm
        conda run -n pflm-test python -m pip install --verbose --no-build-isolation --editable . --config-settings editable-verbose=true --config-settings build-dir=build/gha-conda-${{ runner.os }}-${{ matrix.python-version }}

    - name: Test with pytest
      shell: pwsh
      run: |
        conda run -n pflm-test python -m pytest . -v

  build-linux:
    name: Build distribution 📦 (Linux, Python ${{ matrix.python-version }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ ubuntu-tests, ubuntu-tests-extended, windows-conda-tests, windows-conda-tests-extended ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install pypa/build
      run: python -m pip install build

    - name: Build wheel (and sdist for 3.13 only)
      run: |
        if [[ "${{ matrix.python-version }}" == "3.13" ]]; then
          python -m build
        else
          python -m build --wheel
        fi

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions-linux-py${{ matrix.python-version }}
        path: dist/

  build-windows-conda:
    name: Build distribution 📦 (Windows conda, Python ${{ matrix.python-version }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ ubuntu-tests, ubuntu-tests-extended, windows-conda-tests, windows-conda-tests-extended ]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Miniconda with Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: pflm-build
        auto-activate-base: false
        channels: conda-forge
        python-version: ${{ matrix.python-version }}

    - name: Install build tools
      shell: pwsh
      run: |
        conda run -n pflm-build python -m pip install --upgrade pip
        conda run -n pflm-build python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0" build

    - name: Build wheel
      shell: pwsh
      run: |
        conda run -n pflm-build python -m build --no-isolation --wheel

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions-windows-conda-py${{ matrix.python-version }}
        path: dist/

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build-linux, build-windows-conda ]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/pflm/

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        pattern: python-package-distributions-*
        merge-multiple: true
        path: dist/

    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build-linux, build-windows-conda ]
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/project/pflm/

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        pattern: python-package-distributions-*
        merge-multiple: true
        path: dist/

    - name: Publish distribution 📦 to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
