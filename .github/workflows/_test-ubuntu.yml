name: "Ubuntu tests (reusable)"

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test, e.g. '[\"3.12\", \"3.13\"]'"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0"
        python -m pip install .[tests]
        python -m pip uninstall -y pflm
        python -m pip install --verbose --no-build-isolation --editable . \
          --config-settings editable-verbose=true \
          --config-settings build-dir=build/gha-${{ runner.os }}-${{ matrix.python-version }}

    - name: Test with pytest
      run: |
        python -m pytest . -v
