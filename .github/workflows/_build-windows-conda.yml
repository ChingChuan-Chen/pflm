name: "Build Windows conda wheels (reusable)"

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to build, e.g. '[\"3.10\", \"3.11\", \"3.12\", \"3.13\"]'"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: "Windows conda wheel (Python ${{ matrix.python-version }})"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Miniconda with Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: pflm-build
        auto-activate-base: false
        channels: conda-forge
        python-version: ${{ matrix.python-version }}

    - name: Install build tools
      shell: pwsh
      run: |
        conda run -n pflm-build python -m pip install --upgrade pip
        conda run -n pflm-build python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0" build

    - name: Build wheel
      shell: pwsh
      run: |
        conda run -n pflm-build python -m build --no-isolation --wheel

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions-windows-conda-py${{ matrix.python-version }}
        path: dist/
