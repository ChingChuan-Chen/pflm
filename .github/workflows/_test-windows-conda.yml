name: "Windows conda tests (reusable)"

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test, e.g. '[\"3.12\", \"3.13\"]'"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v5

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Miniconda with Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: pflm-test
        auto-activate-base: false
        channels: conda-forge
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      shell: pwsh
      run: |
        conda run -n pflm-test python -m pip install --upgrade pip
        conda run -n pflm-test python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0"
        conda run -n pflm-test python -m pip install .[tests]
        conda run -n pflm-test python -m pip uninstall -y pflm
        conda run -n pflm-test python -m pip install --verbose --no-build-isolation --editable . `
          --config-settings editable-verbose=true `
          --config-settings build-dir=build/gha-conda-${{ runner.os }}-${{ matrix.python-version }}

    - name: Test with pytest
      shell: pwsh
      run: |
        conda run -n pflm-test python -m pytest . -v
