name: "Build wheels"

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to build, e.g. '[\"3.10\", \"3.11\", \"3.12\", \"3.13\"]'"
        required: true
        type: string
      os:
        description: "Operating system to build for, e.g. 'windows-latest', 'ubuntu-latest', etc."
        required: false
        type: string
        default: "ubuntu-latest"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  # cibuildwheel runs inside a manylinux container, producing properly-tagged
  # manylinux_2_28_x86_64 wheels that PyPI/TestPyPI accept.
  build-linux:
    name: "Linux manylinux wheel (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    if: ${{ inputs.os == 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Compute CIBW_BUILD selector
      id: cibw
      run: |
        tag=$(python3 -c "v='${{ matrix.python-version }}'; print('cp' + v.replace('.',''))")
        echo "build=${tag}-manylinux_x86_64" >> "$GITHUB_OUTPUT"

    - name: Build manylinux wheel with cibuildwheel
      uses: pypa/cibuildwheel@v2.23
      with:
        output-dir: dist/
      env:
        CIBW_BUILD: ${{ steps.cibw.outputs.build }}
        # scipy>=1.14 only ships manylinux_2_28 binaries; using manylinux2014
        # forces a source build that fails without OpenBLAS in the container.
        CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64:latest

    - name: Build source distribution (Python 3.13 only)
      if: ${{ matrix.python-version == '3.13' }}
      run: |
        pip install build "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0"
        python -m build --sdist --outdir dist/

    - name: Store distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions-ubuntu-latest-py${{ matrix.python-version }}
        path: dist/

  # ── Windows (conda) ────────────────────────────────────────────────────────
  # Builds against conda-managed NumPy/SciPy using MSVC so the resulting .pyd
  # links against the same CRT as the conda Python runtime.
  build-windows:
    name: "Windows conda wheel (Python ${{ matrix.python-version }})"
    runs-on: windows-latest
    if: ${{ inputs.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: Set up Miniconda with Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: pflm-build
        channels: conda-forge,defaults
        python-version: ${{ matrix.python-version }}

    - name: Install build tools & build wheel
      shell: pwsh
      run: |
        conda run -n pflm-build python -m pip install --upgrade pip
        conda run -n pflm-build python -m pip install "meson-python>=0.17.1" "meson>=1.3" "ninja" "Cython>=3.0.10" "numpy>=1.22.0" "scipy>=1.14.0" build
        conda run -n pflm-build python -m build --no-isolation --wheel

    - name: Store distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions-windows-latest-py${{ matrix.python-version }}
        path: dist/
