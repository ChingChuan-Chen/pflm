name: "Build Linux wheels (reusable)"

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to build, e.g. '[\"3.10\", \"3.11\", \"3.12\", \"3.13\"]'"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: "Linux wheel (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install pypa/build
      run: python -m pip install build

    - name: Build wheel (and sdist for 3.13 only)
      run: |
        if [[ "${{ matrix.python-version }}" == "3.13" ]]; then
          python -m build
        else
          python -m build --wheel
        fi

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions-linux-py${{ matrix.python-version }}
        path: dist/
